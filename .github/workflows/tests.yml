name: Tests

on:
  push:
  pull_request:

jobs:
  pytest:
    name: Pytest (HA test harness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install test dependencies
        run: pip install -r requirements_test.txt
      - name: Run pytest
        run: pytest

  docker-smoke:
    name: hass/core docker smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Load integration inside the Home Assistant container
        run: bash tests/docker/smoke.sh
